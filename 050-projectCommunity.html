<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Community</title>
    <link rel="stylesheet" href="slide-theme-tokens.css">
    <style>
        :root {
            --eff-accent: #334155;
            --eff-accent-border: #1e293b;
            --eff-text-title: #334155;
            --eff-text-body: #64748b;
            --eff-bg-slide: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--page-canvas-bg);
            font-family: var(--font-sans);
        }

        .slide {
            width: var(--slide-width);
            height: var(--slide-height);
            background: var(--eff-bg-slide);
            padding: 28px 36px 32px;
            box-shadow: var(--slide-shadow);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            border: 1px solid var(--eff-accent-border);
            border-radius: 999px;
            background: #ffffff;
            color: var(--eff-accent);
            font-size: 14px;
            font-weight: var(--font-weight-semibold);
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }

        .diagram-wrap {
            width: 100%;
            flex: 1;
            min-height: 0;
            margin-top: 28px;
        }

        .diagram {
            width: 100%;
            height: 100%;
            display: block;
        }

        .t-main {
            font-size: 18px;
            font-weight: var(--font-weight-bold);
            fill: var(--eff-text-title);
        }

        .t-white {
            fill: #ffffff;
        }

        .t-center {
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .t-top {
            font-size: 20px;
            font-weight: var(--font-weight-bold);
            fill: #ffffff;
        }

        .t-top-sub {
            font-size: 14px;
            font-weight: var(--font-weight-semibold);
            fill: rgba(255, 255, 255, 0.92);
        }

        .t-node {
            font-size: 18px;
            font-weight: var(--font-weight-bold);
        }
    </style>
</head>
<body>
<div class="slide" role="document" aria-label="プロジェクトコミュニティ">
    <div class="pill">Project Community</div>
    <div class="diagram-wrap">
        <svg class="diagram" viewBox="0 0 900 500" role="img" aria-label="写真作品の展示会の関係図" preserveAspectRatio="xMidYMid meet">
            <defs>
                <marker id="arrBlack" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto">
                    <path d="M0,0 L8,4 L0,8 z" fill="var(--eff-text-title)"></path>
                </marker>
            </defs>

            <rect x="24" y="16" width="852" height="82" rx="8" fill="var(--eff-text-title)"></rect>
            <text class="t-top t-center" x="450" y="47">ソニーストア銀座での写真展示会</text>
            <text class="t-top-sub t-center" x="450" y="72">会期 2026年10月5日（月）〜10月18日（日）</text>

            <circle cx="170" cy="350" r="110" fill="var(--eff-text-title)"></circle>
            <text class="t-node t-center t-white" x="170" y="357">THL</text>

            <circle cx="730" cy="350" r="110" fill="var(--eff-text-title)"></circle>
            <text class="t-node t-center t-white" x="730" y="357">ソニーストア銀座</text>

            <line x1="150" y1="214" x2="150" y2="132" stroke="var(--eff-text-title)" stroke-width="5" marker-end="url(#arrBlack)"></line>
            <line x1="190" y1="132" x2="190" y2="214" stroke="var(--eff-text-title)" stroke-width="5" marker-end="url(#arrBlack)"></line>
            <text class="t-main" x="54" y="182">展示制作</text>
            <text class="t-main" x="220" y="182">学習機会</text>

            <line x1="710" y1="214" x2="710" y2="132" stroke="var(--eff-text-title)" stroke-width="5" marker-end="url(#arrBlack)"></line>
            <line x1="750" y1="132" x2="750" y2="214" stroke="var(--eff-text-title)" stroke-width="5" marker-end="url(#arrBlack)"></line>
            <text class="t-main" x="588" y="176">会場の提供</text>
            <text class="t-main" x="778" y="176">若年層の認知</text>

            
            <line x1="302" y1="355" x2="605" y2="355" stroke="var(--eff-text-title)" stroke-width="5" ></line>
            <text class="t-main t-center" x="452" y="315">企業プロジェクト</text>
        </svg>
    </div>
</div>
</body>
</html>
