<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image — 銀座四丁目交差点</title>
    <link rel="stylesheet" href="slide-theme-tokens.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--page-canvas-bg);
            font-family: var(--font-sans);
        }

        .slide {
            width: var(--slide-width);
            height: var(--slide-height);
            padding: 0;
            position: relative;
            overflow: hidden;
            box-shadow: var(--slide-shadow);
            background: #000;
        }

        .photo {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center;
        }

        .caption {
            position: absolute;
            right: 28px;
            bottom: 24px;
            margin: 0;
            font-size: 20px;
            font-weight: var(--font-weight-semibold);
            letter-spacing: 0.04em;
            color: rgba(255, 255, 255, 0.78);
            line-height: 1.3;
            text-shadow: 0 1px 12px rgba(0, 0, 0, 0.45);
        }
    </style>
</head>
<body>

<div class="slide" role="document" aria-label="銀座四丁目交差点の写真">
    <img class="photo" src="img/ginza4.png" alt="銀座四丁目交差点の様子" width="960" height="540">
    <p class="caption">銀座四丁目交差点</p>
</div>

</body>
</html>
