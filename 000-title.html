<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>title</title>
    <link rel="stylesheet" href="slide-theme-tokens.css">
    <style>
        :root {
            --eff-accent: #334155;
            --eff-accent-border: #1e293b;
            --eff-text-title: #0f172a;
            --eff-text-body: #64748b;
            --eff-bg-slide: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--page-canvas-bg);
            font-family: var(--font-sans);
        }

        .slide {
            width: var(--slide-width);
            height: var(--slide-height);
            background: var(--eff-bg-slide);
            padding: 48px 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: var(--slide-shadow);
        }

        .kicker {
            margin: 0;
            font-size: 13px;
            font-weight: var(--font-weight-semibold);
            letter-spacing: 0.08em;
            color: var(--eff-accent);
        }

        .rule {
            width: 48px;
            height: 3px;
            margin: 20px 0 24px;
            border-radius: 999px;
            background: var(--eff-accent);
        }

        .main-title {
            margin: 0;
            max-width: 820px;
            font-size: 40px;
            font-weight: var(--font-weight-bold);
            color: var(--eff-text-title);
            line-height: 1.35;
            letter-spacing: 0.02em;
        }

        .subtitle {
            margin: 22px 0 0;
            max-width: 720px;
            font-size: 18px;
            font-weight: var(--font-weight-normal);
            color: var(--eff-text-body);
            line-height: 1.6;
        }

        .meta {
            margin-top: auto;
            padding-top: 28px;
            width: 100%;
            max-width: 848px;
            color: var(--eff-text-body);
            letter-spacing: 0.02em;
        }

        .meta-copy {
            margin: 0;
            font-size: 13px;
            font-weight: var(--font-weight-semibold);
            line-height: 1.5;
        }

        .meta-note {
            margin: 8px 0 0;
            font-size: 11px;
            font-weight: var(--font-weight-normal);
            line-height: 1.55;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="slide" role="document" aria-label="タイトルスライド">
        <p class="kicker">企業プロジェクト</p>
        <div class="rule" aria-hidden="true"></div>
        <h1 class="main-title">新しいブライダルをテーマとした<br>写真展示会の企画制作</h1>
        <p class="subtitle">企画・制作・展示を通じた価値提案の実践学習 / 来店体験の設計</p>
        <footer class="meta" role="contentinfo" aria-label="著作権および商標等の表示">
            <p class="meta-copy">© 2026 東京ホテル・観光&amp;ホスピタリティ専門学校</p>
        </footer>
    </div>
</body>
</html>
